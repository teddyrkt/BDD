<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Gestion Produits{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --primary: #2563eb; --dark: #1e293b; }
    body { background: #f8fafc; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: var(--dark) !important; }
    .navbar-brand { font-weight: 700; font-size: 1.3rem; letter-spacing: 1px; }
    .card { border: none; border-radius: 12px; box-shadow: 0 1px 8px rgba(0,0,0,.08); }
    .card-header { border-radius: 12px 12px 0 0 !important; font-weight: 600; }
    .badge-category { background: #e0e7ff; color: #3730a3; font-size: .75rem; padding: 3px 10px; border-radius: 20px; }
    .price-tag { color: var(--primary); font-weight: 700; font-size: 1.1rem; }
    .table th { background: #f1f5f9; font-weight: 600; color: #475569; font-size: .85rem; text-transform: uppercase; letter-spacing: .5px; }
    .btn-action { width: 32px; height: 32px; padding: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; }
    .stat-card { border-radius: 16px; border: none; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--primary); }
    .search-bar { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 1px 8px rgba(0,0,0,.06); margin-bottom: 24px; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark navbar-expand-lg mb-4">
  <div class="container">
    <a class="navbar-brand" href="{% url 'product_list' %}">
      <i class="bi bi-box-seam me-2"></i>GestionProduits
    </a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link text-white" href="{% url 'product_list' %}"><i class="bi bi-grid me-1"></i>Produits</a>
      <a class="nav-link text-white" href="{% url 'product_create' %}"><i class="bi bi-plus-circle me-1"></i>Ajouter</a>
      <a class="nav-link text-white" href="{% url 'stats' %}"><i class="bi bi-bar-chart me-1"></i>Statistiques</a>
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-success alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
